name: Collect CNBC News

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Write service account credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json
          echo '${{ secrets.NEWS_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa-news.json

      - name: Run CNBC news collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          NEWS_CREDS_FILE: /tmp/gsa-news.json
          US_STOCK_SPREADSHEET_ID: ${{ secrets.US_STOCK_SPREADSHEET_ID }}
        run: python scripts/collect_cnbc.py
