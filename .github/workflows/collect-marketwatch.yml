name: Collect MarketWatch Analyst Estimates

on:
  # Disabled: MarketWatch blocks GitHub Actions IPs (HTTP 401)
  # Run locally instead: scripts/run_mw.sh
  # schedule:
  #   - cron: '0 3 * * *'
  #   - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run MarketWatch collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/collect_marketwatch.py
