name: Collect RSS News

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client googlenewsdecoder

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run RSS news collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          US_STOCK_SPREADSHEET_ID: ${{ secrets.US_STOCK_SPREADSHEET_ID }}
          CNBC_NEWS_SPREADSHEET_ID: ${{ secrets.CNBC_NEWS_SPREADSHEET_ID }}
          REUTERS_NEWS_SPREADSHEET_ID: ${{ secrets.REUTERS_NEWS_SPREADSHEET_ID }}
          USER_CONFIG_SPREADSHEET_ID: ${{ secrets.USER_CONFIG_SPREADSHEET_ID }}
        run: python scripts/collect_news.py
