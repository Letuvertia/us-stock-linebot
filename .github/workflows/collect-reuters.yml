name: Collect Reuters News

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client googlenewsdecoder

      - name: Write service account credentials
        run: echo '${{ secrets.NEWS_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa-news.json

      - name: Run Reuters news collector
        env:
          NEWS_CREDS_FILE: /tmp/gsa-news.json
          USER_CONFIG_SPREADSHEET_ID: ${{ secrets.USER_CONFIG_SPREADSHEET_ID }}
          REUTERS_NEWS_SPREADSHEET_ID: ${{ secrets.REUTERS_NEWS_SPREADSHEET_ID }}
        run: python scripts/collect_reuters.py
