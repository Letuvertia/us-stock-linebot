name: Collect Finnhub Data

on:
  schedule:
    - cron: '15 0-4,10-23 * * *'  # Skip 05-09 UTC (13-17 UTC+8) for FMP/yfinance/MW
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run Finnhub collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          US_STOCK_SPREADSHEET_ID: ${{ secrets.US_STOCK_SPREADSHEET_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/data_collect/collect_finnhub.py
