name: CI/CD

on:
  push:
    branches: ['**']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Resolve deploy version
        id: version
        working-directory: .
        run: |
          # Sort by version (refname:short v-style) so 0.1.0 ranks above 0.0.5,
          # regardless of which was tagged first. git describe orders by tag
          # creation time which is wrong when release.yaml adds a higher tag
          # AFTER the auto-bump tag on the same commit.
          LATEST=$(git tag --sort=-v:refname --merged=HEAD | head -1)
          LATEST=${LATEST:-0.0.0}
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            IFS='.' read -ra p <<< "$LATEST"
            VERSION="${p[0]:-0}.${p[1]:-0}.$((${p[2]:-0}+1))"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
          else
            VERSION="$LATEST-${GITHUB_SHA:0:7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build
        run: npm run build

      - name: Push to Apps Script
        run: npm run push

      - name: Deploy new version (same URL)
        env:
          DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
          DEPLOY_DESC: ${{ steps.version.outputs.version }}
        run: npm run deploy

      - name: Install triggers
        run: |
          URL="https://script.google.com/macros/s/${{ secrets.GAS_DEPLOYMENT_ID }}/exec?action=install-triggers&token=${{ secrets.INSTALL_TRIGGERS_TOKEN }}"
          response=$(curl -sL -w '\nHTTP_STATUS:%{http_code}' "$URL")
          status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "$status"
          echo "$body"
          if [[ "$status" != "200" || "$body" != "OK" ]]; then
            echo "::error::install-triggers failed"
            exit 1
          fi
