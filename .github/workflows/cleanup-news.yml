name: Cleanup Old News

on:
  schedule:
    - cron: '47 18 * * *'  # 2:47 AM UTC+8
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run news cleanup
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/cleanup_news.py
