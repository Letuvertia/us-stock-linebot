name: Collect yfinance Data

on:
  schedule:
    - cron: '0 22 * * *'   # 6:00 AM UTC+8 daily
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client yfinance

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run yfinance collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          US_STOCK_SPREADSHEET_ID: ${{ secrets.US_STOCK_SPREADSHEET_ID }}
        run: python scripts/data_collect/collect_yfinance.py
