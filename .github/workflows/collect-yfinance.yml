name: Collect yfinance Data

on:
  schedule:
    - cron: '33 22 * * 1-5'   # 6:33 AM UTC+8 weekdays (after market close)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client yfinance

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/gsa.json

      - name: Run yfinance collector
        env:
          GOOGLE_CREDS_FILE: /tmp/gsa.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/collect_yfinance.py
